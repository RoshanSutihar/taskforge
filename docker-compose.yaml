version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskforge
      POSTGRES_PASSWORD: taskforge
      POSTGRES_DB: taskforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    environment:
      DATABASE_URL: postgres://taskforge:taskforge@postgres:5432/taskforge?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      ORCHESTRATOR_PORT: :8080
      HEARTBEAT_TIMEOUT: 15
      REAPER_INTERVAL: 10
      SCHEDULER_INTERVAL: 1
    ports:
      - "8188:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-1:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgres://taskforge:taskforge@postgres:5432/taskforge?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      WORKER_CONCURRENCY: 10
      HEARTBEAT_INTERVAL: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      orchestrator:
        condition: service_started
    restart: unless-stopped

  worker-2:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgres://taskforge:taskforge@postgres:5432/taskforge?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      WORKER_CONCURRENCY: 10
      HEARTBEAT_INTERVAL: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      orchestrator:
        condition: service_started
    restart: unless-stopped

  worker-3:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgres://taskforge:taskforge@postgres:5432/taskforge?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      WORKER_CONCURRENCY: 10
      HEARTBEAT_INTERVAL: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      orchestrator:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: